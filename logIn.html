<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="main-content">
        <div class="login-section">
              <h1> User Login</h1>
              <form class="login-form">
                <input class="email" type="Name" name="name" placeholder="Enter Your Name"/>
                <input class="email" type="email" name="email" placeholder="Enter Your Email"/>
                <input class="email" type="password" name="password" placeholder="Enter Your Password"/>
                <input class="email" type="confirmPassword" name="confirmPassword" placeholder="Confirm Your Password"/>
              </form>
              <button class="login-button">Login</button>
        
        </div>
        

    </div>
</body>
</html>
